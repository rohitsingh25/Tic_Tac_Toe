<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Tic-Tac-Toe | AI & Probability Engine</title>
  <meta name="description" content="A premium, highly responsive Tic-Tac-Toe game featuring real-time win/draw probability calculations, a hint system, and a smart bot with Normal and Master modes.">
  
  <!-- Preconnect and Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stars-container"></div>
  
  <div class="app-container">
    <header class="app-header">
      <h1 class="logo">NEON <span>TIC-TAC-TOE</span></h1>
      <p class="subtitle">AI &amp; Real-time Probability Engine</p>
    </header>

    <main class="game-container">
      <!-- Configuration Panel -->
      <section class="config-panel glass-card" aria-label="Game Settings">
        <span class="panel-label">Game Mode:</span>
        <div class="mode-toggle-group">
          <button id="btn-mode-normal" class="mode-btn active" aria-pressed="true">
            <span class="dot green"></span> Normal Bot
          </button>
          <button id="btn-mode-master" class="mode-btn" aria-pressed="false">
            <span class="dot purple"></span> Master Bot
          </button>
        </div>
      </section>

      <!-- Status Indicator -->
      <section id="status-card" class="status-card glass-card" aria-live="polite">
        <div class="status-text" id="status-message">Determining first player...</div>
        <div class="badge" id="first-player-badge">First Move</div>
      </section>

      <!-- Layout wrapper for Board and Sidebar -->
      <div class="game-layout">
        <!-- Tic-Tac-Toe Board -->
        <section class="board-wrapper" aria-label="Game Board">
          <div class="board" id="game-board">
            <button class="cell" data-index="0" aria-label="Square 1, Empty"></button>
            <button class="cell" data-index="1" aria-label="Square 2, Empty"></button>
            <button class="cell" data-index="2" aria-label="Square 3, Empty"></button>
            <button class="cell" data-index="3" aria-label="Square 4, Empty"></button>
            <button class="cell" data-index="4" aria-label="Square 5, Empty"></button>
            <button class="cell" data-index="5" aria-label="Square 6, Empty"></button>
            <button class="cell" data-index="6" aria-label="Square 7, Empty"></button>
            <button class="cell" data-index="7" aria-label="Square 8, Empty"></button>
            <button class="cell" data-index="8" aria-label="Square 9, Empty"></button>
          </div>
        </section>

        <!-- Sidebar Panel for Metrics and Controls -->
        <section class="sidebar-panel">
          <!-- Probability Dashboard -->
          <div class="probability-card glass-card" aria-label="User Live Probabilities">
            <h2 class="section-title">Your Odds</h2>
            
            <!-- Win Probability -->
            <div class="probability-bar-group">
              <div class="bar-header">
                <span class="bar-label">Win Probability</span>
                <span id="txt-prob-win" class="bar-value">--%</span>
              </div>
              <div class="bar-container">
                <div id="bar-prob-win" class="bar-fill win" style="width: 0%"></div>
              </div>
            </div>

            <!-- Draw Probability -->
            <div class="probability-bar-group">
              <div class="bar-header">
                <span class="bar-label">Draw Probability</span>
                <span id="txt-prob-draw" class="bar-value">--%</span>
              </div>
              <div class="bar-container">
                <div id="bar-prob-draw" class="bar-fill draw" style="width: 0%"></div>
              </div>
            </div>

            <!-- Loss Probability -->
            <div class="probability-bar-group">
              <div class="bar-header">
                <span class="bar-label">Loss Probability</span>
                <span id="txt-prob-loss" class="bar-value">--%</span>
              </div>
              <div class="bar-container">
                <div id="bar-prob-loss" class="bar-fill loss" style="width: 0%"></div>
              </div>
            </div>
          </div>

          <!-- Controls panel -->
          <div class="controls-card glass-card" aria-label="Game Controls">
            <button id="btn-hint" class="action-btn hint-btn" aria-label="Show Hint">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
                <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/>
                <path d="M9 18h6"/>
                <path d="M10 22h4"/>
              </svg>
              Get Hint
            </button>
            <button id="btn-restart" class="action-btn restart-btn" aria-label="Restart Game">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
                <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                <path d="M16 3h5v5"/>
                <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                <path d="M8 21H3v-5"/>
              </svg>
              Restart
            </button>
          </div>
        </section>
      </div>
    </main>

    <footer class="app-footer">
      <p>Designed with premium aesthetics &bull; Fully Responsive</p>
    </footer>
  </div>

  <!-- JavaScript file -->
  <script src="script.js"></script>
</body>
</html>
